name: agentpaas
version: 0.1.0
description: AgentPaaS governance — build, deploy, and operate governed agents from inside Hermes
author: AgentPaaS
provides_tools:
  - agentpaas_init_project
  - agentpaas_reconcile_project
  - agentpaas_validate_project
  - agentpaas_doctor
  - agentpaas_pack
  - agentpaas_run
  - agentpaas_stop
  - agentpaas_logs
  - agentpaas_status
  - agentpaas_get_run_timeline
  - agentpaas_policy_show
  - agentpaas_explain_policy_denial
  - agentpaas_recommend_policy_patch
  - agentpaas_audit_query
  - agentpaas_export_audit
  - agentpaas_summarize_run
  - agentpaas_explain_failure
  - agentpaas_next_action
requires_env:
  - name: AGENTPAAS_HOME
    description: "AgentPaaS home directory (where daemon socket and state live)"
  - name: AGENTPAAS_SOCKET
    description: "AgentPaaS daemon Unix socket path"
    secret: false