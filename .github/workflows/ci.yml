name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install golangci-lint
        run: brew install golangci-lint
      - name: Run lint
        run: make lint

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run tests
        run: make test

  race:
    name: Race Detector
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run race detector
        run: make race

  proto:
    name: Proto Codegen Drift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install buf and protoc plugins
        run: |
          brew install buf protoc-gen-go protoc-gen-go-grpc
          # protoc-gen-grpc-gateway is not on Homebrew — install via go
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
      - name: Regenerate proto code
        run: make proto
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make proto' and commit the changes."
            exit 1
          fi

  osv:
    name: OSV Scan
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install osv-scanner
        run: brew install osv-scanner
      - name: Run OSV scan
        run: make osv
