name: Release Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      cosign: ${{ steps.filter.outputs.cosign }}
      goreleaser: ${{ steps.filter.outputs.goreleaser }}
      brew: ${{ steps.filter.outputs.brew }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cosign:
              - 'internal/pack/**'
              - 'go.mod'
              - 'go.sum'
            goreleaser:
              - '.goreleaser.yaml'
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            brew:
              - 'Formula/**'
              - '.goreleaser.yaml'
            docs:
              - 'docs/**'
              - 'README.md'

  cosign-integration:
    name: Cosign Integration (R8)
    needs: detect-changes
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || needs.detect-changes.outputs.cosign == 'true'
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
      AGENTPAAS_PACK_REAL_TOOLS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Real cosign integration test
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          go test -tags integration -count=1 ./internal/pack/... \
            -run '^TestSignImage_RealCosign$' -timeout 120s

  goreleaser-snapshot:
    name: Goreleaser Snapshot (R22)
    needs: detect-changes
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || needs.detect-changes.outputs.goreleaser == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Goreleaser config validation (build only, skip signing/publish)
        # R22 goal: catch .goreleaser.yaml errors before release. Snapshot mode
        # builds all targets but we skip signing (cosign keyless hangs without
        # interactive browser auth) and publishing (no tag). `--snapshot` alone
        # still attempts signing, so we use `build` + `archive` + `checksum`
        # targets via --skip to validate the config without the sign step.
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          # Validate config parses + builds all targets + archives + checksums.
          # Skips sign/publish/docker/brew/docs — those are validated at release time.
          goreleaser build --clean --snapshot
          goreleaser release --snapshot --clean --skip=sign,publish,docker,before 2>&1 || \
          goreleaser check

  brew-audit:
    name: Brew Audit (R23)
    needs: detect-changes
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || needs.detect-changes.outputs.brew == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # SHA256 placeholders in Formula/agentpaas.rb are intentional until goreleaser fills them at release.
      - name: Brew style check on formula template
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          brew style Formula/agentpaas.rb

  docs-links:
    name: Docs Links (R24)
    needs: detect-changes
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || needs.detect-changes.outputs.docs == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Broken link check
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          lychee --no-progress docs/ README.md