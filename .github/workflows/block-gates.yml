name: Block Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: block-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  block1-gate:
    name: Block 1 Gate
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run block1-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block1-gate

  block5-gate:
    name: Block 5 Gate
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run block5-gate
        env:
          AGENTPAAS_DOCKER_TESTS: "1"
          DOCKER_HOST: "unix:///Users/pms88/.colima/default/docker.sock"
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block5-gate

  # Placeholder for future blocks — these will be enabled when their blocks are implemented
  block2-gate-placeholder:
    name: Block 2 Gate (not implemented)
    runs-on: self-hosted
    if: false  # Disabled until Block 2 is implemented
    steps:
      - run: echo "Block 2 gate will be enabled when Block 2 is implemented"
