name: Block Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: block-gates-${{ github.ref }}
  cancel-in-progress: true

# Shared paths that should trigger all gates (deps, proto, build config)
# Each block gate also has its own path filter for its specific code.
jobs:
  block1-gate:
    name: Block 1 Gate
    runs-on: self-hosted
    timeout-minutes: 10
    # Block 1: repo bootstrap, proto contracts — triggers on proto/api/build config
    if: |
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'go.sum') ||
      contains(join(github.event.commits.*.modified, ','), 'Makefile') ||
      contains(join(github.event.commits.*.added, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'api/') ||
      contains(join(github.event.commits.*.added, ','), 'api/') ||
      contains(join(github.event.commits.*.modified, ','), '.github/workflows/')
    steps:
      - uses: actions/checkout@v4
      - name: Run block1-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block1-gate

  block5-gate:
    name: Block 5 Gate
    runs-on: self-hosted
    timeout-minutes: 15
    # Block 5: RuntimeDriver + fenced network topology — internal/runtime/
    if: |
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'go.sum') ||
      contains(join(github.event.commits.*.modified, ','), 'Makefile') ||
      contains(join(github.event.commits.*.added, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'internal/runtime/') ||
      contains(join(github.event.commits.*.added, ','), 'internal/runtime/') ||
      contains(join(github.event.commits.*.modified, ','), '.github/workflows/')
    steps:
      - uses: actions/checkout@v4
      - name: Run block5-gate
        env:
          AGENTPAAS_DOCKER_TESTS: "1"
          DOCKER_HOST: "unix:///Users/pms88/.colima/default/docker.sock"
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block5-gate

  block6-gate:
    name: Block 6 Gate
    runs-on: self-hosted
    timeout-minutes: 5
    # Block 6: Harness + Python SDK — internal/harness/, python/
    if: |
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'go.sum') ||
      contains(join(github.event.commits.*.modified, ','), 'Makefile') ||
      contains(join(github.event.commits.*.added, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'internal/harness/') ||
      contains(join(github.event.commits.*.added, ','), 'internal/harness/') ||
      contains(join(github.event.commits.*.modified, ','), 'python/') ||
      contains(join(github.event.commits.*.added, ','), 'python/') ||
      contains(join(github.event.commits.*.modified, ','), '.github/workflows/')
    steps:
      - uses: actions/checkout@v4
      - name: Run block6-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block6-gate

  block7-gate:
    name: Block 7 Gate
    runs-on: self-hosted
    timeout-minutes: 5
    # Block 7: Secrets broker — internal/secrets/
    if: |
      github.event_name == 'pull_request' ||
      contains(join(github.event.commits.*.modified, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'go.sum') ||
      contains(join(github.event.commits.*.modified, ','), 'Makefile') ||
      contains(join(github.event.commits.*.added, ','), 'go.mod') ||
      contains(join(github.event.commits.*.modified, ','), 'internal/secrets/') ||
      contains(join(github.event.commits.*.added, ','), 'internal/secrets/') ||
      contains(join(github.event.commits.*.modified, ','), '.github/workflows/')
    steps:
      - uses: actions/checkout@v4
      - name: Run block7-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block7-gate
