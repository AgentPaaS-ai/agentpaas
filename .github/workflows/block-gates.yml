name: Block Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'api/**'
      - 'internal/runtime/**'
      - 'internal/harness/**'
      - 'python/**'
      - 'internal/secrets/**'
      - '.github/workflows/block-gates.yml'

concurrency:
  group: block-gates-${{ github.ref }}
  cancel-in-progress: true

# Each block gate runs only when its own code or shared files change.
# The workflow-level `paths` filter above controls WHEN the workflow runs.
# The per-job `if` conditions below control WHICH gates run within it.
#
# Shared paths (trigger all gates): go.mod, go.sum, Makefile, api/**,
# .github/workflows/block-gates.yml
#
# When adding a new block gate:
# 1. Add its code path to the `paths:` list above
# 2. Add a blockN-gate job below with the appropriate `if` condition
# 3. Update Makefile: blockN-gate: build test race lint osv
# 4. For Docker blocks: set AGENTPAAS_DOCKER_TESTS and DOCKER_HOST in env

jobs:
  block1-gate:
    name: Block 1 Gate
    runs-on: self-hosted
    timeout-minutes: 10
    if: |
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      contains(github.event.head_commit.modified, 'Makefile') ||
      contains(github.event.head_commit.modified, 'api/') ||
      contains(github.event.head_commit.modified, '.github/workflows/block-gates.yml') ||
      contains(github.event.head_commit.added, 'go.mod') ||
      contains(github.event.head_commit.added, 'api/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run block1-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block1-gate

  block5-gate:
    name: Block 5 Gate
    runs-on: self-hosted
    timeout-minutes: 15
    if: |
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      contains(github.event.head_commit.modified, 'Makefile') ||
      contains(github.event.head_commit.modified, 'internal/runtime/') ||
      contains(github.event.head_commit.modified, '.github/workflows/block-gates.yml') ||
      contains(github.event.head_commit.added, 'go.mod') ||
      contains(github.event.head_commit.added, 'internal/runtime/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run block5-gate
        env:
          AGENTPAAS_DOCKER_TESTS: "1"
          DOCKER_HOST: "unix:///Users/pms88/.colima/default/docker.sock"
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block5-gate

  block6-gate:
    name: Block 6 Gate
    runs-on: self-hosted
    timeout-minutes: 5
    if: |
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      contains(github.event.head_commit.modified, 'Makefile') ||
      contains(github.event.head_commit.modified, 'internal/harness/') ||
      contains(github.event.head_commit.modified, 'python/') ||
      contains(github.event.head_commit.modified, '.github/workflows/block-gates.yml') ||
      contains(github.event.head_commit.added, 'go.mod') ||
      contains(github.event.head_commit.added, 'internal/harness/') ||
      contains(github.event.head_commit.added, 'python/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run block6-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block6-gate

  block7-gate:
    name: Block 7 Gate
    runs-on: self-hosted
    timeout-minutes: 5
    if: |
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      contains(github.event.head_commit.modified, 'Makefile') ||
      contains(github.event.head_commit.modified, 'internal/secrets/') ||
      contains(github.event.head_commit.modified, '.github/workflows/block-gates.yml') ||
      contains(github.event.head_commit.added, 'go.mod') ||
      contains(github.event.head_commit.added, 'internal/secrets/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run block7-gate
        run: |
          export PATH="/opt/homebrew/bin:$PATH:$(go env GOPATH)/bin"
          make block7-gate
