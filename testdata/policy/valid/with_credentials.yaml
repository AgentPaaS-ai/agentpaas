version: "1.0"
agent:
  name: cred-agent
credentials:
  - id: "github-token"
    type: header
    header: "Authorization"
    value: "Bearer ${env:GITHUB_TOKEN}"
  - id: "openai-key"
    type: header
    header: "x-api-key"
    value: "${env:OPENAI_API_KEY}"
  - id: "vault-ref"
    type: brokered
    service: "vault"
    path: "kv/data/agent/keys"
