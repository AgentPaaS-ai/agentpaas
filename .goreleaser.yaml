version: 2

project_name: agentpaas

before:
  hooks:
    - go mod tidy

builds:
  - id: agentpaas
    main: ./cmd/agentpaas
    binary: agentpaas
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.CLIVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.DaemonVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.GitCommit={{.Commit}}

  - id: agentpaasd
    main: ./cmd/agentpaasd
    binary: agentpaasd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.CLIVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.DaemonVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.GitCommit={{.Commit}}

  - id: harness-linux
    main: ./cmd/harness
    binary: agentpaas-harness-linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.CLIVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.DaemonVersion={{.Version}}
      - -X github.com/AgentPaaS-ai/agentpaas/internal/daemon.GitCommit={{.Commit}}

archives:
  # Darwin archives ship agentpaas + agentpaasd plus the cross-compiled
  # linux harness (needed for `agentpaas pack` on macOS where containers run linux/arm64).
  - id: darwin
    format: tar.gz
    ids:
      - agentpaas
      - agentpaasd
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - demo/**/*
      - src: dist/harness-linux_linux_arm64*/agentpaas-harness-linux
        dst: .

  - id: harness-linux
    format: tar.gz
    ids:
      - harness-linux
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

sboms:
  - id: default
    ids:
      - darwin
      - harness-linux
    artifacts: archive

signs:
  - id: cosign
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum

brews:
  - name: agentpaas
    homepage: https://github.com/AgentPaaS-ai/agentpaas
    description: "Governed, local-first runtime for AI-generated agents"
    license: MIT
    directory: Formula
    repository:
      owner: AgentPaaS-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "agentpaas"
      bin.install "agentpaasd"
      bin.install "agentpaas-harness-linux"
    test: |
      system "#{bin}/agentpaas", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: AgentPaaS-ai
    name: agentpaas
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"