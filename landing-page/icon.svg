<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="h2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="h2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D5A8E"/>
    </linearGradient>
    <linearGradient id="h2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CB3C60"/>
      <stop offset="100%" stop-color="#9E2D4A"/>
    </linearGradient>
    <linearGradient id="h2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5A8E"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="h2s"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1E3A5F" flood-opacity="0.15"/></filter>
    <filter id="h2g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="h2glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Tighter background circle (less whitespace) -->
  <circle cx="100" cy="100" r="88" fill="url(#h2bg)" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#h2b)" stroke-width="1" opacity="0.3"/>

  <!-- ===== ROBOT HEAD ===== -->
  <g filter="url(#h2s)">
    <rect x="55" y="38" width="90" height="52" rx="14" fill="url(#h2a)" opacity="0.92"/>
    <rect x="55" y="38" width="90" height="52" rx="14" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Antenna -->
  <g fill="none" stroke="url(#h2b)" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="100" y1="38" x2="100" y2="26"/>
  </g>
  <circle cx="100" cy="24" r="3" fill="url(#h2b)" opacity="0.7"/>

  <!-- Robot eyes (circuit nodes) -->
  <g filter="url(#h2glow)">
    <circle cx="78" cy="60" r="6" fill="white" stroke="url(#h2b)" stroke-width="2.5"/>
    <circle cx="122" cy="60" r="6" fill="white" stroke="url(#h2b)" stroke-width="2.5"/>
  </g>
  <g fill="url(#h2b)">
    <circle cx="78" cy="60" r="3"/>
    <circle cx="122" cy="60" r="3"/>
  </g>

  <!-- Circuit mouth / grill -->
  <g fill="none" stroke="white" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="72" y1="76" x2="88" y2="76"/>
    <line x1="92" y1="76" x2="108" y2="76"/>
    <line x1="112" y1="76" x2="128" y2="76"/>
  </g>

  <!-- ===== NECK (circuit traces) ===== -->
  <g fill="none" stroke="#CB3C60" stroke-width="2" opacity="0.5">
    <line x1="90" y1="90" x2="90" y2="100"/>
    <line x1="100" y1="90" x2="100" y2="100"/>
    <line x1="110" y1="90" x2="110" y2="100"/>
  </g>

  <!-- ===== ROBOT TORSO / CHEST ===== -->
  <g filter="url(#h2s)">
    <rect x="48" y="100" width="104" height="52" rx="12" fill="url(#h2b)" opacity="0.95"/>
    <rect x="48" y="100" width="104" height="52" rx="12" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Circuit traces on torso -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <path d="M56,126 H68 V116 H78"/>
    <path d="M122,126 H132 V116 H144"/>
    <path d="M56,140 H70"/>
    <path d="M130,140 H144"/>
  </g>

  <!-- Shoulder circuit branches -->
  <g fill="none" stroke="#CB3C60" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <path d="M48,108 H36 V120 H28"/>
    <path d="M152,108 H164 V120 H172"/>
  </g>
  <g fill="#CB3C60" opacity="0.5">
    <circle cx="28" cy="120" r="3"/>
    <circle cx="172" cy="120" r="3"/>
  </g>

  <!-- ===== CHEST PROCESSOR ===== -->
  <g filter="url(#h2s)">
    <polygon points="100,108 118,117 118,135 100,144 82,135 82,117" fill="url(#h2a)"/>
    <polygon points="100,108 118,117 118,135 100,144 82,135 82,117" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- "A" on chest -->
  <g fill="white" filter="url(#h2g)">
    <path d="M93,130 l3,-14 h8 l3,14 h-3 l-1,-4 h-6 l-1,4 h-3z M95,124 h10 l-5,-10z"/>
  </g>

  <!-- Chest connection nodes -->
  <g fill="white" opacity="0.5">
    <circle cx="82" cy="126" r="2"/>
    <circle cx="118" cy="126" r="2"/>
  </g>

  <!-- ===== WAIST / HIP CONNECTORS ===== -->
  <g fill="none" stroke="#CB3C60" stroke-width="1.5" opacity="0.4">
    <line x1="85" y1="152" x2="85" y2="160"/>
    <line x1="115" y1="152" x2="115" y2="160"/>
  </g>

  <!-- ===== LEGS ===== -->
  <g filter="url(#h2s)">
    <rect x="68" y="160" width="28" height="18" rx="6" fill="url(#h2c)" opacity="0.85"/>
    <rect x="104" y="160" width="28" height="18" rx="6" fill="url(#h2c)" opacity="0.85"/>
  </g>

  <!-- Leg circuit traces -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <path d="M76,166 H88"/>
    <path d="M112,166 H124"/>
  </g>

  <!-- ===== ORBITING DATA RINGS ===== -->
  <g fill="none" stroke="url(#h2b)" stroke-width="1" opacity="0.15">
    <ellipse cx="100" cy="100" rx="68" ry="28" transform="rotate(-20 100 100)"/>
    <ellipse cx="100" cy="100" rx="68" ry="28" transform="rotate(20 100 100)"/>
  </g>

  <!-- Orbiting data dots -->
  <g fill="url(#h2b)" opacity="0.35">
    <circle cx="32" cy="88" r="2"/>
    <circle cx="168" cy="88" r="2"/>
    <circle cx="32" cy="112" r="2"/>
    <circle cx="168" cy="112" r="2"/>
  </g>
</svg>