<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="lgNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D5A8E"/>
    </linearGradient>
    <linearGradient id="lgRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CB3C60"/>
      <stop offset="100%" stop-color="#9E2D4A"/>
    </linearGradient>
    <linearGradient id="lgLeg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5A8E"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="lgText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D5A8E"/>
    </linearGradient>
    <filter id="lgSh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1E3A5F" flood-opacity="0.15"/></filter>
    <filter id="lgGl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="lgEye"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="88" fill="url(#lgBg)" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#lgRose)" stroke-width="1" opacity="0.3"/>

  <!-- Robot HEAD -->
  <g filter="url(#lgSh)">
    <rect x="55" y="38" width="90" height="52" rx="14" fill="url(#lgNavy)" opacity="0.92"/>
    <rect x="55" y="38" width="90" height="52" rx="14" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>
  <g fill="none" stroke="url(#lgRose)" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="100" y1="38" x2="100" y2="26"/>
  </g>
  <circle cx="100" cy="24" r="3" fill="url(#lgRose)" opacity="0.7"/>
  <g filter="url(#lgEye)">
    <circle cx="78" cy="60" r="6" fill="white" stroke="url(#lgRose)" stroke-width="2.5"/>
    <circle cx="122" cy="60" r="6" fill="white" stroke="url(#lgRose)" stroke-width="2.5"/>
  </g>
  <g fill="url(#lgRose)">
    <circle cx="78" cy="60" r="3"/><circle cx="122" cy="60" r="3"/>
  </g>
  <g fill="none" stroke="white" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="72" y1="76" x2="88" y2="76"/><line x1="92" y1="76" x2="108" y2="76"/><line x1="112" y1="76" x2="128" y2="76"/>
  </g>
  <g fill="none" stroke="#CB3C60" stroke-width="2" opacity="0.5">
    <line x1="90" y1="90" x2="90" y2="100"/><line x1="100" y1="90" x2="100" y2="100"/><line x1="110" y1="90" x2="110" y2="100"/>
  </g>

  <!-- Robot TORSO -->
  <g filter="url(#lgSh)">
    <rect x="48" y="100" width="104" height="52" rx="12" fill="url(#lgRose)" opacity="0.95"/>
    <rect x="48" y="100" width="104" height="52" rx="12" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>
  <g fill="none" stroke="white" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <path d="M56,126 H68 V116 H78"/><path d="M122,126 H132 V116 H144"/><path d="M56,140 H70"/><path d="M130,140 H144"/>
  </g>
  <g fill="none" stroke="#CB3C60" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <path d="M48,108 H36 V120 H28"/><path d="M152,108 H164 V120 H172"/>
  </g>
  <g fill="#CB3C60" opacity="0.5"><circle cx="28" cy="120" r="3"/><circle cx="172" cy="120" r="3"/></g>

  <!-- CHEST PROCESSOR -->
  <g filter="url(#lgSh)">
    <polygon points="100,108 118,117 118,135 100,144 82,135 82,117" fill="url(#lgNavy)"/>
    <polygon points="100,108 118,117 118,135 100,144 82,135 82,117" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  <g fill="white" filter="url(#lgGl)">
    <path d="M93,130 l3,-14 h8 l3,14 h-3 l-1,-4 h-6 l-1,4 h-3z M95,124 h10 l-5,-10z"/>
  </g>
  <g fill="white" opacity="0.5"><circle cx="82" cy="126" r="2"/><circle cx="118" cy="126" r="2"/></g>

  <!-- WAIST + LEGS -->
  <g fill="none" stroke="#CB3C60" stroke-width="1.5" opacity="0.4">
    <line x1="85" y1="152" x2="85" y2="160"/><line x1="115" y1="152" x2="115" y2="160"/>
  </g>
  <g filter="url(#lgSh)">
    <rect x="68" y="160" width="28" height="18" rx="6" fill="url(#lgLeg)" opacity="0.85"/>
    <rect x="104" y="160" width="28" height="18" rx="6" fill="url(#lgLeg)" opacity="0.85"/>
  </g>
  <g fill="none" stroke="white" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <path d="M76,166 H88"/><path d="M112,166 H124"/>
  </g>

  <!-- ORBITING RINGS -->
  <g fill="none" stroke="url(#lgRose)" stroke-width="1" opacity="0.15">
    <ellipse cx="100" cy="100" rx="68" ry="28" transform="rotate(-20 100 100)"/>
    <ellipse cx="100" cy="100" rx="68" ry="28" transform="rotate(20 100 100)"/>
  </g>
  <g fill="url(#lgRose)" opacity="0.35">
    <circle cx="32" cy="88" r="2"/><circle cx="168" cy="88" r="2"/>
    <circle cx="32" cy="112" r="2"/><circle cx="168" cy="112" r="2"/>
  </g>

  <!-- WORDMARK (single line: AgentPaaS.ai) - adjusted for full visibility -->
  <g transform="translate(200, 0)">
    <text x="20" y="120" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="url(#lgText)" letter-spacing="-1.2">Agent</text>
    <text x="147" y="120" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#CB3C60" letter-spacing="-0.5">PaaS</text>
    <text x="247" y="120" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="300" fill="#64748B" letter-spacing="-0.5">.ai</text>
    <!-- Underline accent bar under PaaS -->
    <rect x="147" y="131" width="100" height="3" rx="1.5" fill="url(#lgRose)" opacity="0.5"/>
  </g>
</svg>