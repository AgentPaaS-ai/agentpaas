<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D5A8E"/>
    </linearGradient>
    <linearGradient id="fRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CB3C60"/>
      <stop offset="100%" stop-color="#9E2D4A"/>
    </linearGradient>
    <filter id="fSh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E3A5F" flood-opacity="0.2"/></filter>
  </defs>
  <!-- Hexagon base -->
  <g filter="url(#fSh)">
    <polygon points="32,8 52,18 52,38 32,48 12,38 12,18" fill="url(#fNavy)"/>
    <polygon points="32,8 52,18 52,38 32,48 12,38 12,18" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  </g>
  <!-- Rose accent bar -->
  <polygon points="32,28 40,32 40,40 32,44 24,40 24,32" fill="url(#fRose)" opacity="0.9"/>
  <!-- "A" letter -->
  <text x="32" y="14" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-0.5">A</text>
</svg>